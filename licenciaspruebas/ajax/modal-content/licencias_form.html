//clientes
function consulta_clientes() {
    try{
        var php_consulta = ruta_php + 'clientes_catalogo.php';
        var datos = '';
        var lst_datos = $('#lst_clientes');
       
        ////mostramos el loader
        muestra_loader();
        $.ajax({
            type: 'POST',
            url: encodeURI(php_consulta),
            data: datos,
            crossDomain: true,
            cache: false,
            success: function (respuesta) {
              
                //alert(respuesta);
                var datos_tabla = JSON.parse(respuesta);
                
                var registros = [];
                var ids = {};
                
                $.each(datos_tabla, function (i, registro) {
                    var reg = registro.empresa + ' - ' + registro.nombres + ' ' + registro.apellidos;
                    ids[reg] = registro;
                    registros.push(reg);
                });
                            
                lst_datos.typeahead({
                    source: registros,
                    autoSelect: false, 
                    updater: function (item) {
                        id_sel = ids[item].id_cliente;
                        return item;
                       
                    },
                    highlighter: function (item) {
                        var regex = new RegExp( '(' + this.query + ')', 'gi' );
                        return item.replace( regex, "<strong>$1</strong>" );
                    },
                    afterSelect: function(item) {
                        id_sel = ids[item].id_cliente;
                        consulta_cliente(id_sel);
                        //alert(id_sel);
                    }                    
                    
                });
                ////ocultamos el loader
                oculta_loader();
            },
            error: function (respuesta) {
                oculta_loader();
                var mensaje = 'No pude acceder al servidor en estos momentos, intente nuevamente y verifíque que el dispositivo tenga conexión a internet y si el problema persiste comuniquese con el administrador.';
                alert(JSON.stringify(respuesta));
            }
        });
    }
    catch(err) {
        alert(err.message); 
    }
}

function genera_cadena(){
    var caracteres = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    var cadena = '';
    for(var i=0; i < 12; i++) {
        cadena += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
    }
    return cadena;
}

function guarda_registro(datos){
    try{
         var php_consulta = ruta_php + "licencias_agregar.php";
        ////mostramos el loader
        //muestra_loader();
        $.ajax({
            type: 'POST',
            url: encodeURI(php_consulta),
            data: datos,
            crossDomain: true,
            cache: false,
            success: function (respuesta) {
                ////ocultamos el loader  
                //oculta_loader();
                var datos_tabla = JSON.parse(respuesta);
                for (var i = 0; i < datos_tabla.length; i++) {
                    var status = datos_tabla[i].status;
                    var mensaje = datos_tabla[i].mensaje;
                }
                if(status === 'warning'){
                    mensaje_alerta(mensaje);
                    $('#txt_codigo_1').focus();
                }
                if(status === 'success'){
                    $('#modal_form').modal('toggle');
                    mensaje_exito(mensaje);
                    consulta_catalogo();
                }
                if(status === 'error'){
                    mensaje_error(mensaje);
                }
                              
            },
            error: function (respuesta) {
                //oculta_loader();
                //alert(JSON.stringify(respuesta));
                var mensaje = 'No pude acceder al servidor en estos momentos, intente nuevamente y verifíque que el dispositivo tenga conexión a Internet y si el problema persiste comuníquese con el administrador.';
                mensaje_error(mensaje);
            }
        });
    }
    catch(err){
        //oculta_loader();
        alert(err.message);
    }
}
 
$('#txt_precio_venta').on('change paste keyup', function () {
    var precio_venta = Number($('#txt_precio_venta').val());
    var cantidad = Number($('#txt_cantidad').val());

    $('#lbl_importe').html('<strong>' + importe.toFixed(2) + '</strong>');
});

$('#txt_cantidad').on('change paste keyup', function () {

    var importe = precio_venta * cantidad;

});
    
$('#txt_precio_venta').focusout(function () {

});
