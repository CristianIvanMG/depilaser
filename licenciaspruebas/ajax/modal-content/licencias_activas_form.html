<script>

//
    $('#btn_elimina_lic').click(function(e){
        
        var n_seleccionados = tabla_lic.rows('.selected').count();
        if(n_seleccionados === 0){
            mensaje_alerta('Selecciona un registro para continuar');
            return;
        }
    
        $.SmartMessageBox({
            
            title : '<i class="fa fa-warning txt-color-orangeDark"></i> Atención',
            content : 'Al eliminar un dispositivo activado la licencia del mismo se libera para volver a ser usada en otro dispositivo sin garantizar la desactivación del software. Esta acción no podrá ser deshecha. ¿Realmente desea continuar?',
		    buttons : '[No][Si]'
            
        }, function(ButtonPressed) {
            
            if (ButtonPressed === 'Si') {
                elimina_activacion();
            }
            if (ButtonPressed === 'No') {
                
            }
            
        });
        e.preventDefault();
    
    });
    
    function elimina_activacion(){
    try{
        
        var php_consulta = ruta_php + "licencias_activas_eliminar.php";
        var datos = 'id_seleccionado=' + id_lic_seleccionado;
        //alert(php_consulta);
        ////mostramos el loader
        
        muestra_loader();
        
        $.ajax({
            type: 'POST',
            url: encodeURI(php_consulta),
            data: datos,
            crossDomain: true,
            cache: false,
            success: function (respuesta) {
                ////ocultamos el loader
                oculta_loader();
                var datos_tabla = JSON.parse(respuesta);
                for (var i = 0; i < datos_tabla.length; i++) {
                    var status = datos_tabla[i].status;
                    var mensaje = datos_tabla[i].mensaje;
                }
                if(status === 'warning'){
                    tabla_lic.cell( index_lic_seleccionado, 9 ).data( '<span class="center-block padding-5 label label-danger">SI</span>' ).draw();
                    mensaje_alerta(mensaje);
                }
                if(status === 'success'){
                    tabla_lic.cell( index_lic_seleccionado, 9 ).data( '<span class="center-block padding-5 label label-danger">SI</span>' ).draw();
                    mensaje_exito(mensaje);
                }
                if(status === 'error'){
                    mensaje_error(mensaje);
                }
            },
            error: function (respuesta) {
                oculta_loader();
                var mensaje = 'No pude acceder al servidor en estos momentos, intente nuevamente y verifíque que el dispositivo tenga conexión a internet y si el problema persiste comuniquese con el administrador.';
                mensaje_error(mensaje);
            }
        });
    }
    catch(err){
        oculta_loader();
        alert(err.message);
    }
}

                for (var i = 0; i < datos_tabla.length; i++) {
                    var status = datos_tabla[i].status;
                    var mensaje = datos_tabla[i].mensaje;
                }
                if(status === 'warning'){
                    tabla_lic.cell( index_lic_seleccionado, 10 ).data( '<span class="center-block padding-5 label label-danger">SI</span>' ).draw();
                    mensaje_alerta(mensaje);

                if(status === 'success'){
                    tabla_lic.cell( index_lic_seleccionado, 10 ).data( '<span class="center-block padding-5 label label-danger">SI</span>' ).draw();

    catch(err){

//tabla licencias
var tabla_lic = $('#tabla_lic_activas').DataTable({
    colReorder: false, 
    ordering: true,

	bInfo: true,

       rightColumns: 1

var id_lic_seleccionado = 0;
var index_lic_seleccionado = -1;

$('#tabla_lic_activas tbody').on( 'click', 'tr', function () {
    
    index_lic_seleccionado = this;
    id_lic_seleccionado = tabla_lic.cell(index_lic_seleccionado, 1).data(); //conseguimos el valos de la celda deseada
    //alert(id_lic_seleccionado);
    if ( $(this).hasClass('selected') ) {
        $(this).removeClass('selected');
    }
    else {
        $('#tabla_lic_activas').DataTable().$('tr.selected').removeClass('selected');
        $(this).addClass('selected');
    }
} );

function oculta_columnas_tabla(indices){
    $.each( indices, function( index, value ) {
        tabla_lic.column(value).visible(false);  
    });
}
    
function muestra_columnas_tabla(indices){
    //lista de los indices de las columnas que queremos mostrar
    $.each( indices, function( index, value ) {
        tabla_lic.column(value).visible(true);  
    });
}
    

$(document).ready(function () {
    //lista de los indices de las columnas de la tabla que queremos ocultar o mostrar
    var indices = [1];
    oculta_columnas_tabla(indices);
    
})();
        
</script>
