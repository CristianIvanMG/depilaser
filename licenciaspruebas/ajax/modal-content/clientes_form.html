<div class="modal-header">

         <form class="smart-form">

                       <section  class="col col-8">

            </div>

            <div class="row">

				       </section>
				       
				       <section  class="col col-6">

				       </section>
            </div>
            
            
            
            </fieldset>

                       <section  class="col col-8">

				       </section>
            
                       <section  class="col col-4">
                       <label class="input"><i class="icon-append fa fa-home"></i>

				       </section>
				       
				       <section  class="col col-6">
